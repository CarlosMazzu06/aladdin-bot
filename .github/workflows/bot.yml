name: Aladdin Trading Bot

on:
  schedule:
    # Cada 15 minutos, 24/7
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Permite ejecución manual desde GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install numpy
        run: pip install numpy
      
      - name: Run Aladdin Bot
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
        run: python bot/aladdin_bot.py
      
      - name: Persist state
        run: |
          git config user.name "Aladdin Bot"
          git config user.email "bot@aladdin.local"
          git add state/
          git diff --staged --quiet || git commit -m "bot: $(date -u '+%Y-%m-%d %H:%M UTC') | $(grep -o 'POSITION.*' state/live_heartbeat.txt 2>/dev/null || echo 'UNKNOWN')"
          git push
